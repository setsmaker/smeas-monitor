<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SMEAS · Monitor BLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap');

  :root {
    --bg:        #0a0c0f;
    --bg2:       #0f1318;
    --bg3:       #141a22;
    --border:    #1e2a38;
    --accent:    #00d4ff;
    --warn:      #ffaa00;
    --danger:    #ff3d3d;
    --ok:        #00ff88;
    --text:      #c8d8e8;
    --text-dim:  #4a6070;
    --mono:      'Share Tech Mono', monospace;
    --sans:      'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  header {
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: 0.15em;
  }
  .logo span { color: var(--text-dim); }

  #status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--text-dim);
    display: inline-block;
    margin-right: 8px;
    transition: background 0.3s;
  }
  #status-dot.connected   { background: var(--ok);     box-shadow: 0 0 8px var(--ok); }
  #status-dot.connecting  { background: var(--warn);   animation: pulse 0.8s infinite; }
  #status-dot.error       { background: var(--danger); }

  #status-text {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  main { padding: 16px; display: flex; flex-direction: column; gap: 14px; }

  /* PPV grande */
  .ppv-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 20px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  #ppv-value {
    font-family: var(--mono);
    font-size: 4.2rem;
    line-height: 1;
    color: var(--ok);
    transition: color 0.2s;
    min-width: 0;
  }
  #ppv-value.warn   { color: var(--warn); }
  #ppv-value.danger { color: var(--danger); }

  .ppv-unit {
    font-family: var(--sans);
    font-size: 1rem;
    font-weight: 300;
    color: var(--text-dim);
    padding-bottom: 10px;
    letter-spacing: 0.05em;
  }

  .ppv-label {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.6;
    padding-bottom: 8px;
  }

  /* bins DIN */
  .bins-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .bin {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 8px 8px;
    text-align: center;
  }
  .bin-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .bin-val {
    font-family: var(--mono);
    font-size: 1.3rem;
    font-weight: 600;
  }
  .bin-range {
    font-family: var(--sans);
    font-size: 0.58rem;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .bin.b0 .bin-val { color: var(--text-dim); }
  .bin.b1 .bin-val { color: var(--accent); }
  .bin.b2 .bin-val { color: var(--warn); }
  .bin.b3 .bin-val { color: var(--danger); }

  /* gráfica */
  .chart-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 12px 8px;
  }

  .chart-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .chart-title {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  .chart-legend {
    display: flex;
    gap: 12px;
  }
  .legend-item {
    font-family: var(--mono);
    font-size: 0.58rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .legend-line {
    width: 16px; height: 2px;
    display: inline-block;
  }

  canvas#chart {
    width: 100%;
    height: 200px;
    display: block;
  }

  /* botón conectar */
  .btn-connect {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--mono);
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s, color 0.2s;
    text-transform: uppercase;
  }
  .btn-connect:hover  { background: var(--accent); color: var(--bg); }
  .btn-connect:active { opacity: 0.7; }
  .btn-connect:disabled {
    border-color: var(--text-dim);
    color: var(--text-dim);
    cursor: not-allowed;
  }

  .btn-disconnect {
    width: 100%;
    padding: 16px;
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    font-family: var(--mono);
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s, color 0.2s;
    text-transform: uppercase;
    display: none;
  }
  .btn-disconnect:hover { background: var(--danger); color: var(--bg); }

  /* log */
  .log-panel {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    max-height: 110px;
    overflow-y: auto;
  }
  .log-panel::-webkit-scrollbar { width: 4px; }
  .log-panel::-webkit-scrollbar-track { background: var(--bg3); }
  .log-panel::-webkit-scrollbar-thumb { background: var(--border); }

  .log-line {
    font-family: var(--mono);
    font-size: 0.65rem;
    color: var(--text-dim);
    line-height: 1.7;
  }
  .log-line.ok     { color: var(--ok); }
  .log-line.warn   { color: var(--warn); }
  .log-line.error  { color: var(--danger); }
  .log-line .ts    { color: #2a4055; margin-right: 6px; }

  footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <div class="logo">SMEAS<span>·SERS</span></div>
  <div>
    <span id="status-dot"></span>
    <span id="status-text">DESCONECTADO</span>
  </div>
</header>

<main>

  <!-- PPV actual -->
  <div class="ppv-panel">
    <div id="ppv-value">—</div>
    <div class="ppv-unit">mm/s</div>
    <div class="ppv-label">
      PPVvec<br>ÚLTIMO SEGUNDO
    </div>
  </div>

  <!-- Bins DIN 4150-3 -->
  <div class="bins-row">
    <div class="bin b0">
      <div class="bin-label">B0</div>
      <div class="bin-val" id="b0">0</div>
      <div class="bin-range">&lt; 0.1</div>
    </div>
    <div class="bin b1">
      <div class="bin-label">B1</div>
      <div class="bin-val" id="b1">0</div>
      <div class="bin-range">0.1–2.0</div>
    </div>
    <div class="bin b2">
      <div class="bin-label">B2</div>
      <div class="bin-val" id="b2">0</div>
      <div class="bin-range">2.0–10.0</div>
    </div>
    <div class="bin b3">
      <div class="bin-label">B3</div>
      <div class="bin-val" id="b3">0</div>
      <div class="bin-range">&gt; 10.0</div>
    </div>
  </div>

  <!-- Gráfica -->
  <div class="chart-panel">
    <div class="chart-header">
      <span class="chart-title">PPVvec · mm/s · ÚLTIMOS 60s</span>
      <div class="chart-legend">
        <span class="legend-item">
          <span class="legend-line" style="background:var(--warn)"></span>B1 2.0
        </span>
        <span class="legend-item">
          <span class="legend-line" style="background:var(--danger)"></span>B2 10.0
        </span>
      </div>
    </div>
    <canvas id="chart"></canvas>
  </div>

  <!-- Botones -->
  <button class="btn-connect"    id="btn-connect">&#x25B6; CONECTAR SMEAS</button>
  <button class="btn-disconnect" id="btn-disconnect">&#x25A0; DESCONECTAR</button>

  <!-- Log -->
  <div class="log-panel" id="log"></div>

</main>

<footer>SMEAS · DIN 4150-3 · BLE MONITOR</footer>

<script>
// ── UUIDs (deben coincidir con el firmware) ───────────────────
const SVC_UUID  = '12345678-1234-1234-1234-123456789abc';
const PPV_UUID  = '12345678-1234-1234-1234-123456789abd';
const CTRL_UUID = '12345678-1234-1234-1234-123456789abe';

// ── Estado ────────────────────────────────────────────────────
const MAX_POINTS = 60;
const data       = new Array(MAX_POINTS).fill(null);
let   device, server, ppvChar, ctrlChar;

let bins = [0, 0, 0, 0];

// ── Log ───────────────────────────────────────────────────────
function log(msg, cls = '') {
  const el  = document.getElementById('log');
  const now = new Date();
  const ts  = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const line = document.createElement('div');
  line.className = 'log-line ' + cls;
  line.innerHTML = `<span class="ts">${ts}</span>${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// ── Status ────────────────────────────────────────────────────
function setStatus(state, text) {
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = state;
  txt.textContent = text;
}

// ── PPV display ───────────────────────────────────────────────
function updatePPV(val) {
  const el = document.getElementById('ppv-value');
  el.textContent = val.toFixed(2);
  el.className = val >= 10 ? 'danger' : val >= 2 ? 'warn' : '';

  // bins locales (conteo en la web, independiente del payload Sigfox)
  if      (val < 0.1)  { bins[0]++; document.getElementById('b0').textContent = bins[0]; }
  else if (val < 2.0)  { bins[1]++; document.getElementById('b1').textContent = bins[1]; }
  else if (val < 10.0) { bins[2]++; document.getElementById('b2').textContent = bins[2]; }
  else                 { bins[3]++; document.getElementById('b3').textContent = bins[3]; }
}

// ── Canvas chart ──────────────────────────────────────────────
const canvas  = document.getElementById('chart');
const ctx     = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = canvas.offsetWidth  * window.devicePixelRatio;
  canvas.height = canvas.offsetHeight * window.devicePixelRatio;
  drawChart();
}

function drawChart() {
  const W = canvas.width, H = canvas.height;
  const dpr = window.devicePixelRatio;
  ctx.clearRect(0, 0, W, H);

  // fondo
  ctx.fillStyle = '#0f1318';
  ctx.fillRect(0, 0, W, H);

  // rango Y dinámico: mínimo 12, o 1.3× el max visible
  const validData = data.filter(v => v !== null);
  const maxVal    = validData.length ? Math.max(...validData) : 10;
  const yMax      = Math.max(12, maxVal * 1.3);

  function toY(v) { return H - (v / yMax) * H * 0.88 - H * 0.06; }

  // grid horizontal
  const gridVals = [2, 10];
  const gridColors = ['#ffaa0040', '#ff3d3d40'];
  gridVals.forEach((gv, i) => {
    const y = toY(gv);
    ctx.strokeStyle = gridColors[i];
    ctx.lineWidth   = 1 * dpr;
    ctx.setLineDash([4 * dpr, 4 * dpr]);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
    ctx.setLineDash([]);

    // etiqueta
    ctx.fillStyle   = i === 0 ? '#ffaa0088' : '#ff3d3d88';
    ctx.font        = `${9 * dpr}px 'Share Tech Mono', monospace`;
    ctx.fillText(gv.toFixed(1), 4 * dpr, y - 3 * dpr);
  });

  // línea de datos
  const step = W / (MAX_POINTS - 1);
  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth   = 1.5 * dpr;
  ctx.shadowColor = '#00d4ff88';
  ctx.shadowBlur  = 6 * dpr;
  ctx.beginPath();

  let started = false;
  data.forEach((v, i) => {
    if (v === null) return;
    const x = i * step;
    const y = toY(v);
    if (!started) { ctx.moveTo(x, y); started = true; }
    else           ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.shadowBlur = 0;

  // punto actual (último)
  const lastIdx = data.map((v,i) => v !== null ? i : -1).reduce((a,b) => Math.max(a,b), -1);
  if (lastIdx >= 0) {
    const lv = data[lastIdx];
    const x  = lastIdx * step;
    const y  = toY(lv);
    ctx.fillStyle = lv >= 10 ? '#ff3d3d' : lv >= 2 ? '#ffaa00' : '#00d4ff';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur  = 8 * dpr;
    ctx.beginPath();
    ctx.arc(x, y, 3.5 * dpr, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50);

// ── Notificación PPVvec ───────────────────────────────────────
function onPPVNotify(event) {
  const view = event.target.value;
  // float32 little-endian
  const val  = new DataView(view.buffer).getFloat32(0, true);
  if (!isFinite(val) || val < 0) return;

  data.shift();
  data.push(val);
  drawChart();
  updatePPV(val);
}

// ── Conectar ──────────────────────────────────────────────────
async function connect() {
  if (!navigator.bluetooth) {
    log('Web Bluetooth no disponible. Usa Chrome en Android.', 'error');
    return;
  }

  try {
    setStatus('connecting', 'BUSCANDO...');
    log('Buscando dispositivo SMEAS...');

    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'SMEAS' }],
      optionalServices: [SVC_UUID]
    });

    device.addEventListener('gattserverdisconnected', onDisconnected);
    log('Dispositivo seleccionado: ' + device.name);
    setStatus('connecting', 'CONECTANDO...');

    server  = await device.gatt.connect();
    log('GATT conectado');

    const service = await server.getPrimaryService(SVC_UUID);
    ppvChar  = await service.getCharacteristic(PPV_UUID);
    ctrlChar = await service.getCharacteristic(CTRL_UUID);

    // Activar modo BLE en el firmware
    await ctrlChar.writeValue(new Uint8Array([0x01]));
    log('Comando activación enviado (0x01)', 'ok');

    // Suscribir notificaciones PPVvec
    await ppvChar.startNotifications();
    ppvChar.addEventListener('characteristicvaluechanged', onPPVNotify);
    log('Notificaciones PPVvec activas', 'ok');

    setStatus('connected', 'CONECTADO · ' + device.name);
    document.getElementById('btn-connect').style.display    = 'none';
    document.getElementById('btn-disconnect').style.display = 'block';

    // reset bins
    bins = [0,0,0,0];
    ['b0','b1','b2','b3'].forEach(id => document.getElementById(id).textContent = '0');

  } catch (err) {
    log('Error: ' + err.message, 'error');
    setStatus('error', 'ERROR');
  }
}

// ── Desconectar ───────────────────────────────────────────────
function disconnect() {
  if (device && device.gatt.connected) {
    device.gatt.disconnect();
  }
}

function onDisconnected() {
  log('Dispositivo desconectado', 'warn');
  setStatus('', 'DESCONECTADO');
  document.getElementById('btn-connect').style.display    = 'block';
  document.getElementById('btn-disconnect').style.display = 'none';
  document.getElementById('ppv-value').textContent = '—';
  document.getElementById('ppv-value').className   = '';
}

document.getElementById('btn-connect').addEventListener('click', connect);
document.getElementById('btn-disconnect').addEventListener('click', disconnect);

log('Monitor SMEAS listo. Enciende el dispositivo y pulsa CONECTAR.');
</script>
</body>
</html>
